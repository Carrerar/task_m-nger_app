# Deploy with:  npx wrangler deploy   (run inside the worker/ folder)
# First: create a KV namespace and paste its id below.
#   npx wrangler kv namespace create STATE
# Then set the secret (do NOT commit it):
#   npx wrangler secret put SYNC_TOKEN
#
# Optional — AI assistant proxy (secrets, never commit; room ids stay private
# so they are NOT listed here):
#   npx wrangler secret put ANTHROPIC_API_KEY   # from console.anthropic.com
#   npx wrangler secret put AI_ROOMS            # comma-separated room ids
# Optional override for the soft per-room daily cap (plain number, safe here):
#   [vars]
#   AI_DAILY_CAP = "100"

name = "focus-board-sync"
main = "sync-worker.js"
compatibility_date = "2024-09-01"

[[kv_namespaces]]
binding = "STATE"
id = "d1c6ac8be59e44538f1b8d29218c49a8"
